<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospitals & Beds - HealthConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fa-solid fa-heart-pulse"></i> HealthConnect</div>
        <div class="nav-links" id="nav-links"></div>
    </nav>
    <div id="alert-box"></div>

    <div class="page-container" id="main-content">
        <div class="page-header">
            <h2><i class="fa-solid fa-bed-pulse" style="color:var(--primary)"></i> Hospitals & Beds</h2>
            <button id="update-beds-btn" class="btn btn-primary" style="display:none;" onclick="showBedUpdateModal()">Update My Hospital Beds</button>
        </div>
        
        <div class="card" style="margin-bottom: 2rem;">
            <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                <div class="form-group" style="margin-bottom: 0; flex: 1;">
                    <input type="text" id="search-city" placeholder="Search by City">
                </div>
                <button class="btn btn-primary" onclick="loadHospitals()">Search</button>
            </div>
        </div>

        <div class="card-grid" id="hospitals-list"></div>
    </div>

    <!-- Hospital Setup -->
    <div class="auth-container" id="hospital-setup" style="display: none; padding-top: 2rem;">
        <div class="auth-card">
            <h2>Complete Hospital Profile</h2>
            <form id="setup-hospital-form" onsubmit="setupHospital(event)">
                <div class="form-group">
                    <label>Hospital Name</label>
                    <input type="text" id="h-name" required>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="h-city" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="h-address" required></textarea>
                </div>
                <button class="btn btn-primary" type="submit">Complete Setup</button>
            </form>
        </div>
    </div>

    <!-- Update Beds Modal -->
    <div id="bed-update-modal" style="display:none; position:fixed; top:0;left:0; right:0;bottom:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div class="auth-card" style="background:var(--surface);">
            <h3>Update Bed Availability</h3>
            <form id="update-beds-form" onsubmit="updateBeds(event)">
                <div class="form-group">
                    <label>ICU Beds</label>
                    <input type="number" id="icu" min="0" required>
                </div>
                <div class="form-group">
                    <label>Oxygen Beds</label>
                    <input type="number" id="oxy" min="0" required>
                </div>
                <div class="form-group">
                    <label>General Beds</label>
                    <input type="number" id="gen" min="0" required>
                </div>
                <div class="form-group">
                    <label>Ventilator Beds</label>
                    <input type="number" id="vent" min="0" required>
                </div>
                <div style="display:flex;gap:1rem;">
                    <button class="btn btn-primary" style="flex:1;" type="submit">Save</button>
                    <button class="btn btn-outline" style="flex:1;" type="button" onclick="document.getElementById('bed-update-modal').style.display='none'">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const role = localStorage.getItem('role');

        if(mode === 'setup' && role === 'hospital_admin') {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('hospital-setup').style.display = 'flex';
        } else {
            if(role === 'hospital_admin') {
                document.getElementById('update-beds-btn').style.display = 'block';
            }
            loadHospitals();
        }

        async function setupHospital(e) {
            e.preventDefault();
            try {
                await fetchAPI('/hospitals', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: document.getElementById('h-name').value,
                        city: document.getElementById('h-city').value,
                        address: document.getElementById('h-address').value
                    })
                });
                window.location.href = 'dashboard.html';
            } catch (err) {
                showAlert(err.message, 'error', 'alert-box');
            }
        }

        async function loadHospitals() {
            try {
                const city = document.getElementById('search-city').value;
                const hospitals = await fetchAPI(`/hospitals${city ? '?city='+city : ''}`);
                
                const container = document.getElementById('hospitals-list');
                if(hospitals.length === 0) {
                    container.innerHTML = '<p>No hospitals found.</p>';
                    return;
                }
                
                container.innerHTML = hospitals.map(h => `
                    <div class="card">
                        <h3>${h.name}</h3>
                        <p><i class="fa-solid fa-location-dot"></i> ${h.city} - ${h.address}</p>
                        <p><i class="fa-solid fa-phone"></i> ${h.userId ? h.userId.phone : 'N/A'}</p>
                        
                        <div style="margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; text-align:center;">
                                <div style="background:var(--background); padding:0.5rem; border-radius:8px;">
                                    <div style="font-size:1.5rem; font-weight:700; color:var(--primary)">${h.beds ? h.beds.icu : 0}</div>
                                    <div style="font-size:0.75rem; color:var(--text-light)">ICU</div>
                                </div>
                                <div style="background:var(--background); padding:0.5rem; border-radius:8px;">
                                    <div style="font-size:1.5rem; font-weight:700; color:var(--success)">${h.beds ? h.beds.oxygen : 0}</div>
                                    <div style="font-size:0.75rem; color:var(--text-light)">OXYGEN</div>
                                </div>
                                <div style="background:var(--background); padding:0.5rem; border-radius:8px;">
                                    <div style="font-size:1.5rem; font-weight:700; color:var(--warning)">${h.beds ? h.beds.general : 0}</div>
                                    <div style="font-size:0.75rem; color:var(--text-light)">GENERAL</div>
                                </div>
                                <div style="background:var(--background); padding:0.5rem; border-radius:8px;">
                                    <div style="font-size:1.5rem; font-weight:700; color:var(--danger)">${h.beds ? h.beds.ventilator : 0}</div>
                                    <div style="font-size:0.75rem; color:var(--text-light)">VENTILator</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                showAlert(err.message, 'error', 'alert-box');
            }
        }

        function showBedUpdateModal() {
            document.getElementById('bed-update-modal').style.display = 'flex';
        }

        async function updateBeds(e) {
            e.preventDefault();
            try {
                await fetchAPI('/hospitals/beds', {
                    method: 'PUT',
                    body: JSON.stringify({
                        icu: document.getElementById('icu').value,
                        oxygen: document.getElementById('oxy').value,
                        general: document.getElementById('gen').value,
                        ventilator: document.getElementById('vent').value
                    })
                });
                document.getElementById('bed-update-modal').style.display = 'none';
                loadHospitals();
                showAlert('Beds updated successfully', 'success', 'alert-box');
            } catch(err) {
                showAlert(err.message, 'error', 'alert-box');
            }
        }
    </script>
</body>
</html>
