<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HealthConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo"><i class="fa-solid fa-heart-pulse"></i> HealthConnect</a>
    </nav>

    <div class="auth-container" style="padding: 4rem 2rem;">
        <div class="auth-card" style="max-width: 500px;">
            <h2>Create an Account</h2>
            <div id="register-alert" class="alert"></div>
            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create a strong password">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" required placeholder="1234567890">
                </div>
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" required placeholder="New York">
                </div>
                <div class="form-group">
                    <label for="role">Register As</label>
                    <select id="role">
                        <option value="patient">Patient / Standard User</option>
                        <option value="donor">Blood Donor</option>
                        <option value="hospital_admin">Hospital Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        window.checkAuth = function() {
            if(localStorage.getItem('token')) window.location.href = 'dashboard.html';
        }; checkAuth();

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value,
                city: document.getElementById('city').value,
                role: document.getElementById('role').value,
            };
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    localStorage.setItem('role', data.role);
                    
                    // Specific routing logic for role completion
                    if(data.role === 'donor') window.location.href = 'donors.html?mode=setup';
                    else if(data.role === 'hospital_admin') window.location.href = 'hospitals.html?mode=setup';
                    else window.location.href = 'dashboard.html';
                } else {
                    showAlert(data.message, 'error', 'register-alert');
                }
            } catch (err) {
                showAlert('Network error, please try again.', 'error', 'register-alert');
            }
        });
    </script>
</body>
</html>
