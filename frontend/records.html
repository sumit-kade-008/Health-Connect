<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Records - HealthConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .record-card { display: flex; align-items: center; justify-content: space-between; padding: 1rem; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; background: var(--surface); }
        .record-info { display: flex; align-items: center; gap: 1rem; }
        .record-icon { font-size: 2rem; color: var(--primary); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fa-solid fa-heart-pulse"></i> HealthConnect</div>
        <div class="nav-links" id="nav-links"></div>
    </nav>
    <div id="alert-box"></div>

    <div class="page-container">
        <div class="page-header">
            <h2><i class="fa-solid fa-file-medical"></i> My Medical Records</h2>
            <button class="btn btn-primary" onclick="document.getElementById('upload-modal').style.display='flex'">Upload New Record</button>
        </div>
        
        <div id="records-list">
            <!-- Loaded via JS -->
            <p>Loading records...</p>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" style="display:none; position:fixed; top:0;left:0; right:0;bottom:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div class="auth-card" style="background:var(--surface);">
            <h3>Upload Medical Record</h3>
            <form id="upload-form" onsubmit="uploadRecord(event)">
                <div class="form-group">
                    <label>Document Title</label>
                    <input type="text" id="title" required placeholder="e.g. Blood Test Results">
                </div>
                <div class="form-group">
                    <label>File (PDF/Image)</label>
                    <input type="file" id="file" accept=".pdf,image/*" required>
                </div>
                <div style="display:flex;gap:1rem;margin-top:1.5rem;">
                    <button class="btn btn-success" style="flex:1; background:var(--success); color:white; border:none;" type="submit">Upload</button>
                    <button class="btn btn-outline" style="flex:1;" type="button" onclick="document.getElementById('upload-modal').style.display='none'">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const role = localStorage.getItem('role');
        if(role !== 'patient') {
            window.location.href = 'dashboard.html';
        }

        async function loadRecords() {
            try {
                const records = await fetchAPI('/records');
                const container = document.getElementById('records-list');
                
                if(records.length === 0) {
                    container.innerHTML = '<p>No records found. Upload your first document!</p>';
                    return;
                }
                
                container.innerHTML = records.map(r => `
                    <div class="record-card">
                        <div class="record-info">
                            <i class="fa-solid ${r.fileType === 'pdf' ? 'fa-file-pdf' : 'fa-file-image'} record-icon"></i>
                            <div>
                                <h3 style="margin-bottom:0.25rem;">${r.title}</h3>
                                <small style="color:var(--text-light);">${new Date(r.createdAt).toLocaleDateString()}</small>
                            </div>
                        </div>
                        <div style="display:flex; gap:0.5rem;">
                            <a href="http://localhost:5000${r.fileUrl}" target="_blank" class="btn btn-outline btn-sm">View</a>
                            <button onclick="deleteRecord('${r._id}')" class="btn btn-sm" style="background:var(--danger); color:white; border:none;"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                showAlert(err.message, 'error', 'alert-box');
            }
        }
        
        loadRecords();

        async function uploadRecord(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Uploading...';

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('file', document.getElementById('file').files[0]);

            try {
                await fetchAPI('/records', {
                    method: 'POST',
                    body: formData
                });
                document.getElementById('upload-modal').style.display = 'none';
                document.getElementById('upload-form').reset();
                loadRecords();
                showAlert('Record uploaded successfully', 'success', 'alert-box');
            } catch (err) {
                showAlert(err.message, 'error', 'alert-box');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Upload';
            }
        }

        async function deleteRecord(id) {
            if(confirm('Are you sure you want to delete this record?')) {
                try {
                    await fetchAPI(`/records/${id}`, { method: 'DELETE' });
                    loadRecords();
                    showAlert('Record deleted', 'success', 'alert-box');
                } catch(err) {
                    showAlert(err.message, 'error', 'alert-box');
                }
            }
        }
    </script>
</body>
</html>
