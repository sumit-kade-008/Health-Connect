<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - HealthConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fa-solid fa-heart-pulse"></i> HealthConnect</div>
        <div class="nav-links" id="nav-links"></div>
    </nav>
    <div id="alert-box"></div>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Overview</a>
            <a href="admin.html" class="active"><i class="fa-solid fa-users-gear"></i> Admin Panel</a>
        </aside>

        <main class="dashboard-content">
            <div class="page-header">
                <h2><i class="fa-solid fa-users-gear"></i> System Overview</h2>
            </div>
            
            <div class="table-container" style="margin-bottom: 2rem;">
                <div style="padding: 1rem; background: var(--surface); border-bottom: 1px solid var(--border);">
                    <h3>All Users</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>City</th>
                        </tr>
                    </thead>
                    <tbody id="users-table">
                        <tr><td colspan="4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const role = localStorage.getItem('role');
            if(role !== 'hospital_admin') {
                window.location.href = 'dashboard.html';
                return;
            }

            try {
                const users = await fetchAPI('/auth/users');
                const tbody = document.getElementById('users-table');
                if(users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No users found.</td></tr>';
                } else {
                    tbody.innerHTML = users.map(u => `
                        <tr>
                            <td>${u.name}</td>
                            <td>${u.email}</td>
                            <td><span class="badge ${u.role === 'hospital_admin' ? 'badge-danger' : 'badge-info'}">${u.role.toUpperCase()}</span></td>
                            <td>${u.city}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                showAlert(error.message, 'error', 'alert-box');
            }
        });
    </script>
</body>
</html>
