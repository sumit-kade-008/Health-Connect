<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Request - HealthConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fa-solid fa-heart-pulse"></i> HealthConnect</div>
        <div class="nav-links" id="nav-links"></div>
    </nav>
    <div id="alert-box"></div>

    <div class="page-container">
        <div class="page-header" style="justify-content:center; text-align:center;">
            <h2 style="color:var(--danger); font-size: 2.5rem;"><i class="fa-solid fa-truck-medical"></i> Emergency Assistance</h2>
            <p style="width:100%; color:var(--text-light); margin-top:0.5rem;">Request immediate help for blood or hospital beds in your city.</p>
        </div>

        <div class="auth-card" style="max-width: 600px; margin: 0 auto; border: 2px solid var(--danger);">
            <form id="emergency-form" onsubmit="submitEmergency(event)">
                <div class="form-group">
                    <label>I need a...</label>
                    <select id="type" required style="font-size:1.1rem; font-weight:bold;">
                        <option value="bed">Hospital Bed (ICU / Oxygen / Ventilator)</option>
                        <option value="blood">Blood Donor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="location" required placeholder="e.g. New York">
                </div>
                <button type="submit" class="btn btn-accent" style="width:100%; font-size:1.2rem; padding:1rem;">Find Immediate Matches</button>
            </form>
        </div>

        <div id="results-container" style="margin-top: 3rem; display:none;">
            <h3 style="margin-bottom:1.5rem; text-align:center;">Immediate Matches Found</h3>
            <div class="card-grid" id="matches-list"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        async function submitEmergency(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Searching...';
            btn.disabled = true;

            try {
                const response = await fetchAPI('/emergency', {
                    method: 'POST',
                    body: JSON.stringify({
                        type: document.getElementById('type').value,
                        location: document.getElementById('location').value
                    })
                });

                const container = document.getElementById('matches-list');
                const resultsContainer = document.getElementById('results-container');
                resultsContainer.style.display = 'block';

                if (response.matches.donors) {
                    if(response.matches.donors.length === 0) {
                        container.innerHTML = '<div class="alert error">No blood donors found in this city currently.</div>';
                    } else {
                        container.innerHTML = response.matches.donors.map(d => `
                            <div class="card" style="border-color:var(--danger)">
                                <div style="display:flex; justify-content:space-between;">
                                    <h3>${d.userId.name}</h3>
                                    <span class="badge badge-danger">${d.bloodGroup}</span>
                                </div>
                                <p><i class="fa-solid fa-phone"></i> ${d.userId.phone}</p>
                                <a href="tel:${d.userId.phone}" class="btn btn-accent btn-sm" style="margin-top:1rem;">Call Now</a>
                            </div>
                        `).join('');
                    }
                } else if (response.matches.hospitals) {
                    if(response.matches.hospitals.length === 0) {
                        container.innerHTML = '<div class="alert error">No hospitals found in this city currently.</div>';
                    } else {
                        container.innerHTML = response.matches.hospitals.map(h => `
                            <div class="card" style="border-color:var(--primary)">
                                <h3>${h.name}</h3>
                                <p><i class="fa-solid fa-phone"></i> ${h.userId ? h.userId.phone : 'N/A'}</p>
                                <p><i class="fa-solid fa-location-dot"></i> ${h.address}</p>
                                <div style="display:flex; gap:1rem; margin-top:1rem; flex-wrap:wrap;">
                                    ${h.beds ? `
                                        <span class="badge badge-warning">ICU: ${h.beds.icu}</span>
                                        <span class="badge badge-success">O2: ${h.beds.oxygen}</span>
                                        <span class="badge badge-danger">Vent: ${h.beds.ventilator}</span>
                                    ` : '<span class="badge">No bed data</span>'}
                                </div>
                                <a href="tel:${h.userId ? h.userId.phone : ''}" class="btn btn-primary btn-sm" style="margin-top:1rem;">Call Hospital</a>
                            </div>
                        `).join('');
                    }
                }

                showAlert('Emergency request logged! Please contact matches directly.', 'success', 'alert-box');
            } catch (err) {
                showAlert(err.message, 'error', 'alert-box');
            } finally {
                btn.innerHTML = 'Find Immediate Matches';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
