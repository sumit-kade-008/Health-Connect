<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HealthConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fa-solid fa-heart-pulse"></i> HealthConnect</div>
        <div class="nav-links" id="nav-links"></div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <a href="dashboard.html" class="active"><i class="fa-solid fa-chart-line"></i> Overview</a>
            <a href="donors.html"><i class="fa-solid fa-droplet"></i> Blood Donors</a>
            <a href="hospitals.html"><i class="fa-solid fa-bed-pulse"></i> Hospitals</a>
            <a href="emergency.html"><i class="fa-solid fa-truck-medical"></i> Emergency</a>
        </aside>

        <main class="dashboard-content">
            <div class="page-header">
                <h2 id="welcome-message">Welcome to Dashboard</h2>
            </div>
            
            <div id="role-specific-content">
                <!-- Injected via JS -->
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('user');
            if(userStr) {
                const user = JSON.parse(userStr);
                document.getElementById('welcome-message').textContent = `Welcome back, ${user.name}`;
                
                const sidebar = document.getElementById('sidebar');
                if(user.role === 'patient') {
                    const recordLink = document.createElement('a');
                    recordLink.href = 'records.html';
                    recordLink.innerHTML = '<i class="fa-solid fa-file-medical"></i> My Records';
                    sidebar.appendChild(recordLink);

                    document.getElementById('role-specific-content').innerHTML = `
                        <div class="card-grid">
                            <div class="card">
                                <h3><i class="fa-solid fa-file-medical"></i> Medical Records</h3>
                                <p>Manage and view your uploaded prescriptions and reports.</p>
                                <div class="card-actions"><a href="records.html" class="btn btn-outline btn-sm">View Records</a></div>
                            </div>
                            <div class="card">
                                <h3><i class="fa-solid fa-truck-medical"></i> Emergency</h3>
                                <p>Need immediate beds or blood?</p>
                                <div class="card-actions"><a href="emergency.html" class="btn btn-accent btn-sm">Request Help</a></div>
                            </div>
                        </div>
                    `;
                } else if(user.role === 'donor') {
                    document.getElementById('role-specific-content').innerHTML = `
                        <div class="card">
                            <h3><i class="fa-solid fa-droplet" style="color:var(--accent)"></i> Donor Status</h3>
                            <p>Thank you for registering as a blood donor. People in your city can now find you in emergencies.</p>
                            <div class="card-actions"><a href="donors.html" class="btn btn-primary btn-sm">Manage Profile</a></div>
                        </div>
                    `;
                } else if(user.role === 'hospital_admin') {
                    document.getElementById('role-specific-content').innerHTML = `
                        <div class="card">
                            <h3><i class="fa-solid fa-bed-pulse" style="color:var(--primary)"></i> Bed Management</h3>
                            <p>Update your hospital's real-time bed availability.</p>
                            <div class="card-actions"><a href="hospitals.html" class="btn btn-primary btn-sm">Update Beds</a></div>
                        </div>
                    `;
                }
            }
        });
    </script>
</body>
</html>
